# A deliberately broken deployment so the MCP server has something unhealthy to
# report. The container exits non-zero on startup, so Kubernetes puts it into
# CrashLoopBackOff — the exact condition the RAG runbook (Lab 2) explains how to
# fix. That's the chapter's two techniques meeting: MCP finds it live, RAG
# explains it.
apiVersion: v1
kind: Namespace
metadata:
  name: broken-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: broken-demo
  labels:
    app.kubernetes.io/name: payment-processor
    owner: payments-team
    environment: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-processor
        owner: payments-team
    spec:
      containers:
        - name: app
          image: busybox:1.36
          # Start, then exit non-zero — simulates the §4.9 startup DB failure.
          command: ["sh", "-c", "echo 'connecting to database...'; sleep 2; echo 'connection timed out'; exit 1"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
