# Postgres with the pgvector extension — the RAG vector store.
# Single replica, ephemeral-but-persistent via a PVC. This is the only
# component of Chapter 4 that runs in the cluster.
#
# Reached from your host on localhost:30900 (NodePort -> 5432).
apiVersion: v1
kind: Namespace
metadata:
  name: rag-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector
  namespace: rag-demo
type: Opaque
stringData:
  POSTGRES_DB: ragdb
  POSTGRES_USER: rag
  # Demo-only credentials. Fine for a local kind cluster; never do this in production.
  POSTGRES_PASSWORD: ragpassword
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgvector-data
  namespace: rag-demo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgvector
  namespace: rag-demo
  labels:
    app.kubernetes.io/name: pgvector
    app.kubernetes.io/part-of: rag-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgvector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgvector
        app.kubernetes.io/part-of: rag-demo
    spec:
      containers:
        - name: postgres
          # Postgres 16 with pgvector preinstalled.
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: pgvector
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "rag", "-d", "ragdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pgvector-data
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: rag-demo
  labels:
    app.kubernetes.io/name: pgvector
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pgvector
  ports:
    - port: 5432
      targetPort: 5432
      # Mapped to localhost:30900 by 00-cluster-setup/kind-config.yaml
      nodePort: 30900
