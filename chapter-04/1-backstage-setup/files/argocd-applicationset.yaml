apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: backstage-app-discovery
  namespace: argocd
  labels:
    managed-by: backstage
spec:
  generators:
  - git:
      repoURL: https://github.com/YOUR_USERNAME/backstage-components
      revision: HEAD
      files:
      - path: "*/argocd/application.yaml"
  template:
    metadata:
      name: '{{path[0]}}'
      labels:
        app: '{{path[0]}}'
        managed-by: backstage
    spec:
      project: default
      source:
        repoURL: https://github.com/YOUR_USERNAME/backstage-components
        targetRevision: HEAD
        path: '{{path[0]}}/k8s'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path[0]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
